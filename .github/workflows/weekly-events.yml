name: Weekly Moon Event Scout
on:
  schedule:
    - cron: "0 14 * * 1"      # Mondays 14:00 UTC (~7am PT)
  workflow_dispatch: {}        # manual "Run workflow" button
  # repository_dispatch:       # uncomment to trigger via HTTP POST:
  #   types: [run-event-scout] #   POST /repos/<owner>/<repo>/dispatches {"event_type":"run-event-scout"}
jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run python run_weekly.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGENT_ID: ${{ secrets.AGENT_ID }}
          ENVIRONMENT_ID: ${{ secrets.ENVIRONMENT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
